services:
  - type: web
    name: ai-knowledge-atlas
    env: docker
    healthCheckPath: /health
    disk:
      name: atlas-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /app/data
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: FRONTEND_DIST_DIR
        value: /app/frontend/dist
      - key: LLM_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        value: https://your-domain.example
