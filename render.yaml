services:
  - type: web
    name: ai-knowledge-atlas
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /app/data
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: FRONTEND_DIST_DIR
        value: /app/frontend/dist
      - key: LLM_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        value: "*"
